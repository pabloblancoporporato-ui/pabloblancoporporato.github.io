<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffffff">
<title>404 — Pablo Blanco Porporato</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Outfit:wght@300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body { background:#ffffff; color:#111111; font-family:'Outfit',sans-serif; font-weight:300; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:24px; padding:40px; text-align:center; }
  h1 { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300; font-size:clamp(60px,12vw,120px); line-height:1; color:#e0e0e0; }
  p { font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#999999; }
  a { font-size:10px; letter-spacing:.25em; text-transform:uppercase; color:#111111; text-decoration:none; border-bottom:1px solid #111111; padding-bottom:2px; transition:opacity .2s; }
  a:hover { opacity:.5; }
</style>
</head>
<body>
  <h1>404</h1>
  <p>Página no encontrada</p>
  <a href="/">Volver al inicio</a>
</body>
</html>
