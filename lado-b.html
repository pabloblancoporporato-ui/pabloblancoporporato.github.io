<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lado-B — Pablo Blanco Porporato</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #ffffff;
    --ink:       #111111;
    --ink-light: #999999;
    --rule:      #e0e0e0;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    cursor: none;
  }

  /* ── CURSOR ── */
  .cursor {
    position:fixed; width:8px; height:8px;
    background:var(--ink); border-radius:50%;
    pointer-events:none; z-index:9999;
    transform:translate(-50%,-50%);
    transition: width .25s, height .25s, background .25s;
  }
  .cursor-ring {
    position:fixed; width:30px; height:30px;
    border:1px solid var(--ink); border-radius:50%;
    pointer-events:none; z-index:9998;
    transform:translate(-50%,-50%);
    transition: width .25s, height .25s, opacity .25s;
    opacity:.4;
  }

  /* ── NAV ── */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:26px 48px;
    background:rgba(255,255,255,.94);
    backdrop-filter:blur(14px);
    border-bottom:1px solid transparent;
    transition:border-color .4s;
  }
  nav.scrolled { border-color:var(--rule); }

  .nav-logo {
    font-family:'Cormorant Garamond',serif;
    font-size:15px; font-weight:400;
    letter-spacing:.07em; color:var(--ink);
    text-decoration:none; line-height:1.2;
  }
  .nav-logo span {
    display:block; font-size:9px;
    letter-spacing:.3em; text-transform:uppercase;
    color:var(--ink-light); font-family:'Outfit',sans-serif;
    font-weight:300; margin-top:2px;
  }

  .nav-links { display:flex; gap:40px; list-style:none; }
  .nav-links a {
    font-size:10px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--ink-light); text-decoration:none;
    transition:color .2s; position:relative;
  }
  .nav-links a::after {
    content:''; position:absolute; bottom:-3px; left:0;
    width:0; height:1px; background:var(--ink); transition:width .3s;
  }
  .nav-links a:hover { color:var(--ink); }
  .nav-links a:hover::after { width:100%; }
  .nav-links a.active { color:var(--ink); }
  .nav-links a.active::after { width:100%; }

  /* ── GRID ── */
  .grid-section {
    padding: 100px 48px 72px;
  }

  .renders-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
  }

  /* aspect-ratio 1.8:1 (16:9 ≈ 1.78, we use exactly 9/5) */
  .render-item {
    position: relative;
    overflow: hidden;
    background: var(--rule);
    cursor: none;
    aspect-ratio: 9 / 5;
    opacity: 0;
    animation: fadeUp .55s forwards;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .render-item:nth-child(1) { animation-delay:.05s }
  .render-item:nth-child(2) { animation-delay:.12s }
  .render-item:nth-child(3) { animation-delay:.19s }
  .render-item:nth-child(4) { animation-delay:.26s }
  .render-item:nth-child(5) { animation-delay:.33s }
  .render-item:nth-child(6) { animation-delay:.40s }

  .render-img {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover; object-position:center;
    display:block;
    transition: transform .7s cubic-bezier(.25,.46,.45,.94);
  }
  .render-item:hover .render-img { transform:scale(1.03); }

  /* Hover overlay with title */
  .render-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(0,0,0,.55) 0%, transparent 45%);
    opacity:0; transition:opacity .32s ease;
    display:flex; align-items:flex-end;
    padding:28px 36px;
  }
  .render-item:hover .render-overlay { opacity:1; }

  .render-title {
    font-family:'Cormorant Garamond',serif;
    font-size:19px; font-weight:400;
    color:#ffffff; letter-spacing:.03em; line-height:1.2;
    transform:translateY(6px); transition:transform .32s ease;
  }
  .render-item:hover .render-title { transform:translateY(0); }

  /* ── LIGHTBOX ── */
  .lightbox {
    position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,.97);
    display:none;
    align-items:center; justify-content:center;
  }
  .lightbox.open { display:flex; }
  .lightbox-inner {
    display:flex; flex-direction:column;
    align-items:center; gap:18px;
    max-width:94vw; max-height:92vh;
  }
  .lightbox-inner img {
    max-width:92vw; max-height:84vh;
    object-fit:contain; display:block;
  }
  .lightbox-caption {
    font-family:'Cormorant Garamond',serif;
    font-size:20px; font-weight:300;
    color:rgba(255,255,255,.5);
    letter-spacing:.06em;
  }
  .lightbox-close {
    position:fixed; top:28px; right:40px;
    font-size:10px; letter-spacing:.28em; text-transform:uppercase;
    color:rgba(255,255,255,.35); background:none; border:none;
    cursor:none; transition:color .2s;
  }
  .lightbox-close:hover { color:rgba(255,255,255,.85); }

  /* ── FOOTER ── */
  footer {
    border-top:1px solid var(--rule);
    padding:36px 48px;
    display:flex; align-items:center; justify-content:space-between;
  }
  footer p {
    font-size:10px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--ink-light);
  }
  .footer-links { display:flex; gap:28px; }
  .footer-links a {
    font-size:10px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--ink-light);
    text-decoration:none; transition:color .2s;
  }
  .footer-links a:hover { color:var(--ink); }

  /* ── RESPONSIVE ── */
  @media(max-width:900px){
    .renders-grid { grid-template-columns: repeat(2,1fr); gap:10px; }
    nav { padding:18px 20px; }
    .nav-links { gap:18px; }
    .grid-section { padding:90px 16px 56px; }
    footer { flex-direction:column; gap:16px; padding:28px 20px; }
    body { cursor:auto; }
    .cursor,.cursor-ring { display:none; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="nav">
  <a href="index.html" class="nav-logo">
    Pablo Blanco Porporato
    <span>Visualización Arquitectónica</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Proyectos</a></li>
    <li><a href="lado-b.html" class="active">Lado-B</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="director.html">Director</a></li>
    <li><a href="contacto.html">Contacto</a></li>
  </ul>
</nav>

<section class="grid-section">
  <div class="renders-grid">

    <div class="render-item" onclick="openLightbox('XPpen — Racing', 'lb_xencelab.jpg')">
      <img class="render-img" src="lb_xencelab.jpg" alt="XPpen Racing">
      <div class="render-overlay"><div class="render-title">XPpen — Racing</div></div>
    </div>

    <div class="render-item" onclick="openLightbox('The Room', 'lb_the_room.jpg')">
      <img class="render-img" src="lb_the_room.jpg" alt="The Room">
      <div class="render-overlay"><div class="render-title">The Room</div></div>
    </div>

    <div class="render-item" onclick="openLightbox('The Room 01', 'lb_V01_v05.png')">
      <img class="render-img" src="lb_V01_v05.png" alt="The Room 01">
      <div class="render-overlay"><div class="render-title">The Room 01</div></div>
    </div>

    <div class="render-item" onclick="openLightbox('Mundo Submarino', 'lb_C01.png')">
      <img class="render-img" src="lb_C01.png" alt="Mundo Submarino">
      <div class="render-overlay"><div class="render-title">Mundo Submarino</div></div>
    </div>

    <div class="render-item" onclick="openLightbox('Winter Fantasy', 'lb_winter.jpg')">
      <img class="render-img" src="lb_winter.jpg" alt="Winter Fantasy">
      <div class="render-overlay"><div class="render-title">Winter Fantasy</div></div>
    </div>

    <div class="render-item" onclick="openLightbox('Huion — The Artist', 'lb_HA_V02.jpg')">
      <img class="render-img" src="lb_HA_V02.jpg" alt="Huion The Artist">
      <div class="render-overlay"><div class="render-title">Huion — The Artist</div></div>
    </div>

  </div>
</section>

<footer>
  <p>&copy; 2026 Pablo Blanco Porporato</p>
  <div class="footer-links">
    <a href="https://instagram.com" target="_blank">Instagram</a>
    <a href="https://linkedin.com" target="_blank">LinkedIn</a>
    <a href="director.html">Estudio</a>
  </div>
</footer>

<!-- LIGHTBOX -->
<div id="lightbox" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.97);align-items:center;justify-content:center;flex-direction:column;gap:16px;" onclick="closeLightbox()">
  <button onclick="closeLightbox();event.stopPropagation();" style="position:fixed;top:28px;right:40px;background:none;border:none;color:rgba(255,255,255,.5);font-size:10px;letter-spacing:.25em;text-transform:uppercase;cursor:pointer;">Cerrar &times;</button>
  <div onclick="event.stopPropagation()" style="display:flex;flex-direction:column;align-items:center;gap:14px;max-width:94vw;max-height:92vh;">
    <img id="lbImg" src="" alt="" style="max-width:92vw;max-height:84vh;object-fit:contain;display:block;">
    <div id="lbCap" style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;font-weight:300;color:rgba(255,255,255,.5);letter-spacing:.06em;"></div>
  </div>
</div>

<script>
  function openLightbox(title, src) {
    var lb = document.getElementById('lightbox');
    document.getElementById('lbImg').src = src;
    document.getElementById('lbCap').textContent = title;
    lb.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
    document.getElementById('lbImg').src = '';
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeLightbox(); });

  const cur  = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{
    mx=e.clientX; my=e.clientY;
    cur.style.left=mx+'px'; cur.style.top=my+'px';
  });
  (function loop(){
    rx+=(mx-rx)*.12; ry+=(my-ry)*.12;
    ring.style.left=rx+'px'; ring.style.top=ry+'px';
    requestAnimationFrame(loop);
  })();
  document.querySelectorAll('a,button,.render-item').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
      cur.style.width='14px'; cur.style.height='14px';
      ring.style.width='46px'; ring.style.height='46px'; ring.style.opacity='.22';
    });
    el.addEventListener('mouseleave',()=>{
      cur.style.width='8px'; cur.style.height='8px';
      ring.style.width='30px'; ring.style.height='30px'; ring.style.opacity='.4';
    });
  });
  window.addEventListener('scroll',()=>{
    document.getElementById('nav').classList.toggle('scrolled', scrollY>40);
  });
</script>
</body>
</html>
