<style>
  :root { --bg:#ffffff; --ink:#111111; --ink-light:#999999; --rule:#e0e0e0; }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body { background:var(--bg); color:var(--ink); font-family:'Outfit',sans-serif; font-weight:300; cursor:none; }


  /* ── LANG SWITCHER ── */
  .lang-switch { display:flex;align-items:center;gap:6px;margin-left:32px; }
  .lang-btn { font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-light);background:none;border:none;cursor:pointer;transition:color .2s;font-family:'Outfit',sans-serif;font-weight:300;padding:0; }
  .lang-btn.active { color:var(--ink);border-bottom:1px solid var(--ink); }
  .lang-btn:hover { color:var(--ink); }
  .lang-sep { font-size:10px;color:var(--rule); }
  .cursor { position:fixed;width:8px;height:8px;background:var(--ink);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .25s,height .25s; }
  .cursor-ring { position:fixed;width:30px;height:30px;border:1px solid var(--ink);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .25s,height .25s,opacity .25s;opacity:.4; }

  nav { position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:26px 48px;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-bottom:1px solid transparent;transition:border-color .4s; }
  nav.scrolled { border-color:var(--rule); }
  .nav-logo { font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:300;letter-spacing:.07em;color:var(--ink);text-decoration:none;line-height:1.2; }
  .nav-logo span { display:block;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-light);font-family:'Outfit',sans-serif;font-weight:300;margin-top:2px; }
  .nav-links { display:flex;gap:40px;list-style:none; }
  .nav-links a { font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-light);text-decoration:none;transition:color .2s;position:relative; }
  .nav-links a::after { content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--ink);transition:width .3s; }
  .nav-links a:hover { color:var(--ink); }
  .nav-links a:hover::after { width:100%; }
  .nav-links a.active { color:var(--ink); }
  .nav-links a.active::after { width:100%; }

  .stage { min-height:100vh;display:flex;align-items:center;justify-content:center;padding:120px 48px 80px; }

  .bio {
    max-width: 600px;
    text-align: center;
    opacity: 0;
    animation: fadeIn 1.2s .2s forwards;
  }
  .bio a {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(15px, 1.4vw, 20px);
    line-height: 1.35;
    letter-spacing: .01em;
    color: var(--ink);
    text-decoration: none;
    transition: opacity .2s;
  }
  .bio a:hover { opacity: .5; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  footer { border-top:1px solid var(--rule);padding:36px 48px;display:flex;align-items:center;justify-content:space-between; }
  footer p { font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-light); }
  .footer-links { display:flex;gap:28px; }

  .footer-links a:hover { color:var(--ink); } .nav-links{gap:18px;}
    .stage{padding:100px 28px 60px;}
    footer{flex-direction:column;gap:16px;padding:28px 20px;}
    body{cursor:auto;} .cursor,.cursor-ring{display:none;}
  }

  /* ── HAMBURGER ── */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    z-index: 110;
  }
  .hamburger span {
    display: block;
    width: 22px;
    height: 1px;
    background: var(--ink);
    transition: transform .3s, opacity .3s;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

  /* ── MOBILE NAV DRAWER ── */
  .nav-drawer {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 105;
    background: #ffffff;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }
  .nav-drawer.open { display: flex; }
  .nav-drawer a {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(28px, 8vw, 42px);
    font-weight: 300;
    letter-spacing: .04em;
    color: var(--ink);
    text-decoration: none;
    opacity: 0;
    transform: translateY(10px);
    animation: drawerItem .4s forwards;
  }
  .nav-drawer a:nth-child(1){animation-delay:.05s}
  .nav-drawer a:nth-child(2){animation-delay:.10s}
  .nav-drawer a:nth-child(3){animation-delay:.15s}
  .nav-drawer a:nth-child(4){animation-delay:.20s}
  .nav-drawer a:nth-child(5){animation-delay:.25s}
  .nav-drawer a:nth-child(6){animation-delay:.30s}
  .nav-drawer .drawer-lang {
    display: flex; gap: 16px;
    opacity: 0;
    animation: drawerItem .4s .35s forwards;
  }
  .nav-drawer .drawer-lang button {
    font-size: 11px; letter-spacing: .25em; text-transform: uppercase;
    color: var(--ink-light); background: none; border: none;
    cursor: pointer; font-family: 'Outfit', sans-serif;
  }
  .nav-drawer .drawer-lang button.active { color: var(--ink); border-bottom: 1px solid var(--ink); }
  @keyframes drawerItem {
    to { opacity:1; transform:translateY(0); }
  }

  @media(max-width:768px){
    nav { padding:18px 24px; }
    .nav-links { display: none; }
    .lang-switch { display: none; }
    .hamburger { display: flex; }
    .nav-logo { font-size: 14px; }
    .nav-logo span { font-size: 8px; }
    body { cursor: auto; }
    .cursor, .cursor-ring { display: none; }
  }

  @media(max-width:1024px){
    .stage { padding:110px 40px 72px; }
    .contact-wrap { max-width:520px; }
  }
  @media(max-width:768px){
    .stage { padding:100px 24px 60px; }
    .contact-wrap { max-width:100%; }
    .form-row-half { grid-template-columns:1fr; }
    footer { flex-direction:column; gap:14px; padding:28px 16px; }
    .footer-links { flex-wrap:wrap; justify-content:center; gap:16px; }
  }
</style>
</head>
